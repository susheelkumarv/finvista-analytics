<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090d16" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="chart" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.3" />
    </linearGradient>
  </defs>
  
  <!-- Background Card -->
  <rect width="400" height="100" rx="20" fill="url(#bg)" stroke="#1e293b" stroke-width="2"/>
  
  <!-- Icon Badge -->
  <g transform="translate(20, 20)">
    <rect width="60" height="60" rx="16" fill="#1e1b4b" stroke="#312e81" stroke-width="1.5"/>
    <path d="M12 44 L24 30 L34 36 L48 16" fill="none" stroke="url(#chart)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="12,44 24,30 34,36 48,16 48,46 12,46" fill="url(#glow)"/>
    <circle cx="48" cy="16" r="4" fill="#10b981"/>
  </g>
  
  <!-- Typography -->
  <text x="96" y="52" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="32" fill="#ffffff" letter-spacing="-0.5">Fin<tspan fill="#10b981">Vista</tspan></text>
  <text x="98" y="72" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="12" fill="#818cf8" letter-spacing="3">ANALYTICS</text>
</svg>
